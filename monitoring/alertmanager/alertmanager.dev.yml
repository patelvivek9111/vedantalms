# Local Alertmanager — UI: http://localhost:9093
#
# Slack: replace api_url with a NEW webhook from https://api.slack.com/apps (Incoming Webhooks).
# Never commit a real URL if this repo is public — rotate any URL that was pasted into chat/email.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/REPLACE/THIS/WITH_YOUR_WEBHOOK'
        channel: '#alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
