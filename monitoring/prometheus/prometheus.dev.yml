# Local dev: scrape LMS on the host (Docker Desktop: host.docker.internal).
# Start the API first: npm run dev on port 5000.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: lms
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:5000
        labels:
          env: local
