# Example Prometheus alerting rules for LMS (scrape GET /metrics from each app instance).
# Copy into your Prometheus rules directory and adjust job/instance labels.
groups:
  - name: lms_http
    interval: 30s
    rules:
      - alert: LMS_HighLatencyP95
        expr: lms_http_request_latency_p95_ms > 400
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LMS HTTP p95 high"
          description: "p95 latency above 400ms for 10m (instance {{ $labels.instance }})"

      - alert: LMS_HighLatencyP99
        expr: lms_http_request_latency_p99_ms > 1200
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LMS HTTP p99 high"

      - alert: LMS_High5xxRate
        expr: |
          (lms_http_responses_5xx_total / clamp_min(lms_http_requests_recorded_total, 1)) * 100 > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "LMS 5xx rate above 1%"

  - name: lms_dependencies
    interval: 30s
    rules:
      - alert: LMS_MongoDown
        expr: lms_dependency_mongo_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "LMS MongoDB not connected"

      - alert: LMS_RedisAdapterDown
        expr: lms_dependency_redis_adapter_up == 0
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "LMS Socket.IO Redis adapter disabled (multi-instance realtime at risk)"

  - name: lms_realtime
    interval: 30s
    rules:
      - alert: LMS_SocketEventErrorsHigh
        expr: lms_socket_event_errors_total > 200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "QuizWave socket handler errors elevated (tune threshold for your traffic)"

      - alert: LMS_PollTrafficHighWithoutWebsocket
        expr: lms_poll_requests_per_hour_total > 5000 and (lms_messaging_socket_connected + lms_notification_socket_connected) == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High poll traffic with zero websocket connections (P3-2)"
          description: "Check NOTIFICATION_WEBSOCKET_ENABLED, INBOX_WEBSOCKET_ENABLED, and Redis adapter"

      - alert: LMS_PollPerWsConnectionHigh
        expr: lms_poll_per_ws_connection_per_hour > 720
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Poll rate exceeds ~720/hr per websocket connection"

  - name: lms_cost_governance
    interval: 1h
    rules:
      - alert: LMS_CostGovernanceRealtimeDegraded
        expr: lms_cost_governance_realtime_degraded == 1
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Realtime cost efficiency degraded — review /health/ops costGovernance"
