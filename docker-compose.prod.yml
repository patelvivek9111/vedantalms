version: '3.8'
services:
  api:
    build: .
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      REQUIRE_JOB_QUEUE: 'true'
    depends_on:
      - redis
  worker:
    build: .
    command: npm run worker:grading-jobs
    environment:
      NODE_ENV: production
      MONGODB_URI: ${MONGODB_URI}
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
