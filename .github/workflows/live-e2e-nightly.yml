name: Live E2E (L2 nightly)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  live-journey-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/lms-live-e2e-nightly
      JWT_SECRET: ci-live-e2e-jwt-secret
      DEMO_STUDENT_PASSWORD: VedantaDemo8!
      E2E_API_URL: http://127.0.0.1:5000
      E2E_BASE_URL: http://127.0.0.1:3000
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Seed MATH8 demo data for live E2E
        run: npm run seed:e2e:visual

      - name: Start API server
        run: npm start &
        env:
          PORT: 5000

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5000/api/auth/login -o /dev/null 2>/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready"
          exit 1

      - name: Run live journey E2E suite
        run: npm run test:e2e:live

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: live-e2e-failure-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

  seeded-edge-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/lms-seeded-e2e-nightly
      JWT_SECRET: ci-seeded-e2e-jwt-secret
      E2E_API_URL: http://127.0.0.1:5000
      E2E_BASE_URL: http://127.0.0.1:3000
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Seed upload E2E fixtures
        run: npm run seed:e2e:upload

      - name: Start API server
        run: npm start &
        env:
          PORT: 5000

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5000/api/auth/login -o /dev/null 2>/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready"
          exit 1

      - name: Run seed-gated E2E specs
        run: npm run test:e2e:seeded-gated

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: seeded-e2e-failure-artifacts
          path: test-results/
          if-no-files-found: ignore
