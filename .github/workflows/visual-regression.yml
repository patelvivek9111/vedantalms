name: Visual Regression (L3)

on:
  pull_request:
    paths:
      - 'frontend/src/**'
      - 'frontend/index.html'
      - 'e2e/specs/visual-snapshots.spec.ts'
      - 'e2e/playwright.visual.config.ts'
      - 'e2e/specs/snapshots/**'
      - 'e2e/helpers/live-auth.ts'
      - 'scripts/seedVisualE2e.js'
      - '.github/workflows/visual-regression.yml'
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Regenerate Linux baselines and commit to main'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  visual-snapshots:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/lms-visual-e2e
      MONGO_DB_NAME: lms-visual-e2e
      JWT_SECRET: ci-visual-e2e-jwt-secret
      DEMO_STUDENT_PASSWORD: VedantaDemo8!
      E2E_API_URL: http://127.0.0.1:5000
      E2E_BASE_URL: http://127.0.0.1:3000
      CI: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed visual E2E data
        run: npm run seed:e2e:visual

      - name: Start API server
        run: npm start &
        env:
          PORT: 5000

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5000/health -o /dev/null 2>/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready"
          exit 1

      - name: Run visual snapshot suite
        run: |
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.update_baselines }}" = "true" ]; then
            npm run test:e2e:visual:update
          else
            npm run test:e2e:visual
          fi

      - name: Commit updated snapshots
        if: github.event_name == 'workflow_dispatch' && inputs.update_baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/specs/snapshots/
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit"
            exit 0
          fi
          git commit -m "Update visual regression baselines (Linux CI runner)."
          git push

      - name: Upload snapshot diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: visual-snapshot-diffs
          path: test-results/
          if-no-files-found: ignore
