name: E2E Multi-browser (weekly)

on:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:

jobs:
  multibrowser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/lms-multibrowser-e2e
      MONGO_DB_NAME: lms-multibrowser-e2e
      JWT_SECRET: ci-multibrowser-e2e-jwt
      DEMO_STUDENT_PASSWORD: VedantaDemo8!
      E2E_API_URL: http://127.0.0.1:5000
      E2E_BASE_URL: http://127.0.0.1:3000
      CI: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps ${{ matrix.project }}
      - run: npm run seed:e2e:visual
      - run: npm start &
        env:
          PORT: 5000
      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:5000/health -o /dev/null 2>/dev/null && exit 0
            sleep 2
          done
          exit 1
      - name: Cross-browser smoke
        run: npx playwright test -c e2e/playwright.config.ts --project=${{ matrix.project }} e2e/specs/smoke.spec.ts e2e/specs/student-submit-live.spec.ts --workers=1
