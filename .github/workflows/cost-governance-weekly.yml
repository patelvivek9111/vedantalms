name: Cost Governance Weekly

on:
  schedule:
    # Mondays 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Mongo indexes
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          if [ -z "$MONGODB_URI" ]; then
            echo "Skipping validate:indexes — MONGODB_URI not configured"
            exit 0
          fi
          npm run validate:indexes

      - name: File orphan CI gate (P3-1)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          CI_MAX_UNATTACHED_STAGED: ${{ vars.CI_MAX_UNATTACHED_STAGED || '500' }}
          CI_MAX_MISSING_BLOBS: ${{ vars.CI_MAX_MISSING_BLOBS || '50' }}
        run: npm run verify:file-orphans:ci

      - name: Mongo explain CI gate (P3-3)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          CI_MONGO_MAX_DOCS_EXAMINED: ${{ vars.CI_MONGO_MAX_DOCS_EXAMINED || '5000' }}
        run: npm run verify:mongo-explain:ci

      - name: Notification email fanout guard
        run: npm run verify:notification-email-guard
