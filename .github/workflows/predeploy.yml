name: Predeploy Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend bundle
        run: npm run build

      - name: Verify shared grading modules
        run: npm run verify:grading

      - name: Institution migration tests
        run: npm run test:migration

      - name: Grading policy tests (backend)
        run: npm run test:grading

      - name: Grading policy tests (frontend)
        run: npm run test:grading
        working-directory: frontend

      - name: Run smoke check (optional — skips when secrets unavailable)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REQUIRE_REDIS: "false"
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -z "$MONGODB_URI" ]; then
            echo "Skipping smoke test because MONGODB_URI secret is not configured"
            exit 0
          fi
          npm run smoke:predeploy
