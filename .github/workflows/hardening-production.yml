name: Institutional Hardening (G-M)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  hardening:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/lms-hardening-ci
      MONGO_DB_NAME: lms-hardening-ci
      JWT_SECRET: ci-test-jwt-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high || true
      - run: npm run verify:grading
      - run: npm run verify:workflows
      - run: npm run test:grading
      - run: npm run validate:indexes
      - run: npm run migrate:dry-run
      - run: node scripts/verifyAuditIntegrity.js || echo "skip audit integrity without mongo"
        continue-on-error: true
      - run: cd frontend && npm ci && npm run test:grading
