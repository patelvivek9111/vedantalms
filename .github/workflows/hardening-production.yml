name: Institutional Hardening (G-M)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install semgrep
      - run: semgrep scan --config p/nodejs --config p/typescript --config p/react --error

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
      - run: npm run scan:trivy

  zap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: ZAP baseline (production)
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'https://vedantaed.com'
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false
          fail_action: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            report_md.md
          if-no-files-found: ignore

  hardening:
    runs-on: ubuntu-latest

    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/lms-hardening-ci
      MONGO_DB_NAME: lms-hardening-ci
      JWT_SECRET: ci-test-jwt-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v5

      - name: Start MongoDB
        run: bash scripts/ci/start-mongodb.sh

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high || true
      - run: npm run verify:grading
      - run: npm run verify:workflows
      - run: npm run test:grading
      - run: npm run test:serialization
      - run: npm run test:pre-rollout
      - run: npm run validate:indexes
      - run: npm run migrate:dry-run
      - run: node scripts/verifyAuditIntegrity.js || echo "skip audit integrity without mongo"
        continue-on-error: true
      - run: cd frontend && npm ci && npm run test:grading

      - name: Stop MongoDB
        if: always()
        run: bash scripts/ci/stop-mongodb.sh
