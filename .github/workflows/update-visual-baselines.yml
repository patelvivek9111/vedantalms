name: Update Visual Baselines (Linux)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'e2e/specs/snapshots/BASELINE_REFRESH'

permissions:
  contents: write

jobs:
  update-linux-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/lms-visual-e2e
      MONGO_DB_NAME: lms-visual-e2e
      JWT_SECRET: ci-visual-e2e-jwt-secret
      DEMO_STUDENT_PASSWORD: VedantaDemo8!
      E2E_API_URL: http://127.0.0.1:5000
      E2E_BASE_URL: http://127.0.0.1:3000
      CI: true
    steps:
      - uses: actions/checkout@v5

      - name: Start MongoDB
        run: bash scripts/ci/start-mongodb.sh

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Seed visual E2E data
        run: npm run seed:e2e:visual

      - name: Start API server
        run: npm start &
        env:
          PORT: 5000

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5000/health -o /dev/null 2>/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready"
          exit 1

      - name: Regenerate visual baselines on Linux
        run: npm run test:e2e:visual:update

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f e2e/specs/snapshots/BASELINE_REFRESH 2>/dev/null || true
          git add e2e/specs/snapshots/
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit"
            exit 0
          fi
          git commit -m "Update visual regression baselines (Linux CI runner)."
          git push

      - name: Stop MongoDB
        if: always()
        run: bash scripts/ci/stop-mongodb.sh
