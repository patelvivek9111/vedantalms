# Prod-like stack for local capacity load testing (Redis + 3 API replicas + nginx LB).
# Usage:
#   npm run load:stack:up
#   npm run test:load:capacity:stack
#   npm run load:stack:down
services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.load
    expose:
      - '5000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: load-test-capacity-jwt-secret-minimum-32-characters
      REDIS_URL: redis://redis:6379
      REQUIRE_REDIS: 'true'
      NOTIFICATION_FANOUT_QUEUE_ENABLED: 'true'
      FILE_SCAN_QUEUE_ENABLED: 'true'
      QUIZWAVE_DISTRIBUTED_TIMERS: 'false'
      PLANNER_UX_ENABLED: 'true'
      DISABLE_RATE_LIMIT: 'true'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"require('http').get('http://127.0.0.1:5000/health/live',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

  worker-notification-fanout:
    build:
      context: .
      dockerfile: Dockerfile.load
    command: npm run worker:notification-fanout
    env_file:
      - .env
    environment:
      JWT_SECRET: load-test-capacity-jwt-secret-minimum-32-characters
      REDIS_URL: redis://redis:6379
      NOTIFICATION_FANOUT_QUEUE_ENABLED: 'true'
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - '5001:80'
    volumes:
      - ./scripts/load/nginx.load.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/health/live >/dev/null 2>&1 || exit 1']
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s
